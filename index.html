<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>▶ Chapitre : Limites et continuités ⏸</h1>
    <h3>La page Sera blocker le samdi 00:30 </h3>
    <div class="galerie">
        <img src="static/images/COURMCHPLC110426_00001.jpg" 
        alt="Photo 1"
        onclick="openModal(0)">
        <img src="static/images/COURMCHPLC110426_00002.jpg"
        alt="Photo 2"
        onclick="openModal(1)">
    </div>
    <div id="photo-modal">
        <span id="close" onclick="closeModal()">&times;</span>
        <span id="prev" class="nav-btn" onclick="changeSlide(-1)">❮</span>
        <img id="modal-img" src="" alt="">
        <span id="next" class="nav-btn" onclick="changeSlide(1)">❯</span>
    </div>

    
    <script>
 
        const allImages = document.querySelectorAll('.galerie img');
        let currentIndex = 0;

        const modal = document.getElementById("photo-modal");
        const modalImg = document.getElementById("modal-img");

        function openModal(index) {
            currentIndex = index;
            modal.style.display = "flex"; // Pour afficher le model
            modalImg.src = allImages[currentIndex].src; // pour charger l'img
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function changeSlide(n) {
            currentIndex +=n;
            if (currentIndex >= allImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = allImages.length - 1;
            modalImg.src = allImages[currentIndex].src;
        }

        // Fermer si on clique sur le fond noir
        modal.onclick = function(e) {
            if (e.target === modal) closeModal();        
        }

        document.addEventListener('keydown', (e) => {
            if (modal.style.display === "flex") {
                if (e.key === "ArrowRight") photoSuivante();
                if (e.key === "ArrowLeft") photoPrecedente();
                if (e.key === "Escape") fermerPleinEcran();
            }
        });


        
        // --- GESTION DU TACTILE (SWIPE) ---
        modal.addEventListener('touchstart', (e) => {
            xDebut = e.touches[0].clientX;
        }, false);

        modal.addEventListener('touchend', (e) => {
            if (!xDebut) return;

            let xFin = e.changedTouches[0].clientX;
            let difference = xDebut - xFin;

            // Si le glissement est assez long (plus de 50 pixels)
            if (Math.abs(difference) > 50) {
                if (difference > 0) {
                    photoSuivante(); // Glissé vers la gauche -> Photo suivante
                } else {
                    photoPrecedente(); // Glissé vers la droite -> Photo précédente
                }
            }
            xDebut = null; // Réinitialisation
        }, false);


        const statusText = document.getElementById("status");

        // التاريخ النهائي: 18 أبريل 2026 على 00:30
        const targetDate = new Date("2026-04-16T01:15:00");

        function updateTimer() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                statusText.innerHTML = "⛔ La page est bloquée définitivement";
                document.body.innerHTML = "<h1 style='text-align:center;color:red;'>⛔ Accès bloqué définitivement</h1>";
                return;
            }

            let seconds = Math.floor(diff / 1000) % 60;
            let minutes = Math.floor(diff / 1000 / 60) % 60;
            let hours = Math.floor(diff / 1000 / 60 / 60) % 24;
            let days = Math.floor(diff / 1000 / 60 / 60 / 24);

            statusText.innerHTML = `⏳ Blocage dans : ${days}j ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
