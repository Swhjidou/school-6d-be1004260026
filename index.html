<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <script src="script.js"></script>
    <h1>Bienvennu sur la correction de composition N゜2</h1>
    <p>Cliquer sur une photo pour l'agrandir </p>
    <div class="galerie">
        <img src="static/images/CRC2M5CDIRC26_00001.jpg" 
        alt="Photo 1"
        onclick="openModal(0)">
        <img src="static/images/CRC2M6DCBE26_0002.jpg" 
        alt="Photo 2"
        onclick="openModal(1)">
        <img src="static/images/CRC2M6DCBE26_0003.jpg" 
        alt="Photo 3"
        onclick="openModal(2)">
    </div>
    <div id="photo-modal">
        <span id="close" onclick="closeModal()">&times;</span>
        <span id="prev" class="nav-btn" onclick="changeSlide(-1)">❮</span>
        <img id="modal-img" src="" alt="">
        <span id="next" class="nav-btn" onclick="changeSlide(1)">❯</span>
    </div>


    <script>
 
        const allImages = document.querySelectorAll('.galerie img');
        let currentIndex = 0;

        const modal = document.querySelectorAll("photo-modal");
        const modalImg = document.getElementById("modal");

        function openFull(index) {
            currentIndex = index;
            modal.style.display = "flex"; // Pour afficher le model
            modalImg.src = allImages[currentIndex].src // pour charger l'img
        }

        function closeFull() {
            modal.style.display = "none";
        }

        function changeSlide(n) {
            currentIndex +=n;
            if (currentIndex >= allImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = allImages.length - 1;
            modalImg.src = allImages[currentIndex].src;
        }

        // Fermer si on clique sur le fond noir
        modal.onclick = function(e) {
            if (e.target === modal) closeFull();        
        }

    </script>
</body>
</html>
